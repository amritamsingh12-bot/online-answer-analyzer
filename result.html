<!DOCTYPE html>
<html>
<head>
  <title>AI Result</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>📊 AI Evaluation</h2>

  <h3>Predicted Score: <span class="score">4 / 5</span></h3>

  <div class="bar">
    Content <div class="fill" style="width:80%"></div>
  </div>

  <div class="bar">
    Structure <div class="fill" style="width:65%"></div>
  </div>

  <div class="bar">
    Language <div class="fill" style="width:90%"></div>
  </div>

  <h4>✅ Strengths</h4>
  <ul>
    <li>Clear explanation</li>
    <li>Good example</li>
  </ul>

  <h4>❌ Improvements</h4>
  <ul>
    <li>Add conclusion</li>
    <li>Use scientific keywords</li>
  </ul>

  <button onclick="nextPage('question.html')">Try Another</button>
</div>

<script src="script.js"></script>
</body>
</html>
